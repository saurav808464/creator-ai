
<script>
  const chatBox = document.getElementById('chatBox');
  const userInput = document.getElementById('userInput');

  function addMessage(type, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + type;
    div.innerHTML = `<b>${type === 'user' ? 'You' : 'Creator AI'}:</b> ${text.replace(/\n/g, '<br>')}`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function generateReply(input) {
    const text = input.toLowerCase();

    // TITLE
    if (text.includes('title')) {
      if (text.includes('oxygen')) {
        return 'Ye rahe 3 viral YouTube title ideas:\n1. How Long Could You Survive Without Oxygen?\n2. What Happens If Your Body Gets No Oxygen?\n3. 60 Seconds Without Oxygen Will Shock You';
      }
      if (text.includes('water') || text.includes('drank water') || text.includes('never drank')) {
        return 'Ye rahe 3 viral YouTube title ideas:\n1. What If Humans Never Drank Water?\n2. How Long Could You Survive Without Water?\n3. No Water for Days? This Will Happen';
      }
      if (text.includes('sleep')) {
        return 'Ye rahe 3 viral YouTube title ideas:\n1. What If Humans Never Slept?\n2. How Long Can You Survive Without Sleep?\n3. No Sleep for Days Will Shock You';
      }
      return 'Ye rahe 3 viral YouTube title ideas:\n1. This Fact Will Shock You\n2. What Happens If This Stops?\n3. You Won’t Believe This Science Fact';
    }

    // SCRIPT
    if (text.includes('script')) {
      if (text.includes('oxygen')) {
        return 'Short script sample:\n"Socho agar achanak oxygen khatam ho jaye... pehle kuch seconds me dimaag aur body panic mode me chale jayegi. Phir saans tootne lagegi, aur body survival ke liye fight karegi..."';
      }
      if (text.includes('water')) {
        return 'Short script sample:\n"Socho agar insaan paani peena band kar de... pehle body dehydration feel karegi, phir energy down hogi, aur dheere dheere organs par bura asar padne lagega..."';
      }
      return 'Short script sample:\n"Aj hum ek shocking topic ke baare me baat karenge. Jo aap soch bhi nahi sakte, wo body ke andar hona shuru ho jata hai..."';
    }

    // DESCRIPTION
    if (text.includes('description')) {
      if (text.includes('oxygen')) {
        return 'Description sample:\nIs video me hum jaanenge ki oxygen ke bina insaan kitni der survive kar sakta hai aur body me kya kya changes hote hain. Video ko end tak dekho.';
      }
      if (text.includes('water')) {
        return 'Description sample:\nIs video me hum jaanenge ki agar insaan paani na piye to body me kya changes hote hain aur kitne din tak survive kiya ja sakta hai. Video ko end tak dekho.';
      }
      return 'Description sample:\nIs video me hum ek interesting aur shocking fact ke baare me jaanenge. Video ko end tak zarur dekho.';
    }

    // HASHTAGS
    if (text.includes('hashtag')) {
      if (text.includes('oxygen')) {
        return '#shorts #facts #oxygen #humanbody #viralvideo #sciencefacts';
      }
      if (text.includes('water')) {
        return '#shorts #facts #water #dehydration #humanbody #sciencefacts';
      }
      return '#shorts #viral #facts #science #trending #youtube';
    }

    // STUDY
    if (text.includes('study')) {
      return 'Study help:\nKisi bhi answer ko simple karne ke liye topic bhejo. Main usko easy Hindi me samjha dunga.';
    }

    // IDEAS
    if (text.includes('idea')) {
      return 'Video ideas:\n1. What If Humans Never Slept?\n2. What If Earth Stopped Spinning?\n3. How Long Could You Survive Without Water?';
    }

    return 'Main abhi demo mode me hoon. Tum YouTube title, script, description, hashtags, study help, ya video ideas maang sakte ho.';
  }

  function sendMessage() {
    const input = userInput.value.trim();
    if (!input) return;
    addMessage('user', input);
    const reply = generateReply(input);
    setTimeout(() => addMessage('bot', reply), 300);
    userInput.value = '';
  }

  function quickTool(type) {
    let prompt = '';
    if (type === 'title') prompt = 'title oxygen';
    if (type === 'script') prompt = 'script oxygen';
    if (type === 'description') prompt = 'description oxygen';
    if (type === 'hashtags') prompt = 'hashtags oxygen';
    if (type === 'study') prompt = 'study';
    if (type === 'ideas') prompt = 'ideas';
    addMessage('user', prompt);
    const reply = generateReply(prompt);
    setTimeout(() => addMessage('bot', reply), 300);
  }

  function copyChat() {
    const text = chatBox.innerText;
    navigator.clipboard.writeText(text);
    alert('Chat copied ho gaya');
  }
</script>
